<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .sidebar-bg { background-color: #1e293b; }
        .card-bg { background-color: #1e293b; border-color: #334155; }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Sidebar -->
    <aside class="sidebar-bg w-64 p-6 hidden md:flex flex-col border-r border-slate-700">
        <div class="text-xl font-bold mb-10">Dashboard</div>
        <nav class="space-y-4">
            <a href="#" class="block text-indigo-400">Overview</a>
            <a href="#" class="block text-slate-400 hover:text-white transition">Analytics</a>
            <a href="#" class="block text-slate-400 hover:text-white transition">Reports</a>
            <a href="#" class="block text-slate-400 hover:text-white transition">Settings</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header class="mb-8">
            <h1 class="text-2xl font-semibold">Dashboard Overview</h1>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="card-bg p-6 rounded-xl border">
                <p class="text-slate-400 text-sm">Total Revenue</p>
                <div class="text-2xl font-bold mt-1">$128,430</div>
            </div>
            <div class="card-bg p-6 rounded-xl border">
                <p class="text-slate-400 text-sm">Active Users</p>
                <div class="text-2xl font-bold mt-1">42,912</div>
            </div>
            <div class="card-bg p-6 rounded-xl border">
                <p class="text-slate-400 text-sm">Bounce Rate</p>
                <div class="text-2xl font-bold mt-1">24.5%</div>
            </div>
            <div class="card-bg p-6 rounded-xl border">
                <p class="text-slate-400 text-sm">Avg Session</p>
                <div class="text-2xl font-bold mt-1">4m 32s</div>
            </div>
        </div>

        <!-- Main Chart/Data Area -->
        <div class="card-bg p-8 rounded-xl border min-h-[400px] flex flex-col justify-center items-center">
            <p class="text-slate-500 mb-2">Data visualization area</p>
            <div class="w-full h-48 border-2 border-dashed border-slate-700 rounded-lg flex items-center justify-center">
                <span class="text-slate-600">Placeholder for primary metric chart</span>
            </div>
        </div>
    </main>

</body>
</html>
