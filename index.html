<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Dashboard</title>
    <!-- Using Tailwind via CDN for zero-config compatibility with Cloudflare -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Dashboard Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Dashboard</h1>
            <div class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium cursor-pointer hover:bg-indigo-700">
                New Report
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-gray-200">
                <p class="text-gray-500 text-sm">Total Revenue</p>
                <h3 class="text-2xl font-bold mt-1">$45,231.89</h3>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-200">
                <p class="text-gray-500 text-sm">Active Users</p>
                <h3 class="text-2xl font-bold mt-1">2,345</h3>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-200">
                <p class="text-gray-500 text-sm">Conversion</p>
                <h3 class="text-2xl font-bold mt-1">3.2%</h3>
            </div>
        </div>

        <!-- Placeholder Table for Content -->
        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-lg font-semibold mb-4">Activity Feed</h2>
            <div class="space-y-4">
                <div class="h-12 bg-gray-50 rounded-lg border border-dashed border-gray-200 flex items-center px-4 text-sm text-gray-400">
                    No data available yet...
                </div>
            </div>
        </div>
    </div>

</body>
</html>
